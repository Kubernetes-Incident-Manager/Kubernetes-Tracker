name: Reusable CI Build and Push

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "18"
      image_name:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${IMAGE_TAG} -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${IMAGE_TAG}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest
