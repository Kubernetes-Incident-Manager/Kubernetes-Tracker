name: Reusable Service CI

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "18"
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.11"
      image_name:
        description: "Container image name without registry/org"
        required: true
        type: string
      docker_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: "Dockerfile"
      run_trivy:
        description: "Run Trivy image scan"
        required: false
        type: boolean
        default: true
      push_image:
        description: "Push image to ACR"
        required: false
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write # Required for Azure Login with OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      # ----------------------------
      # Set ACR image reference
      # ----------------------------
      - name: Set image ref (ACR)
        shell: bash
        run: |
          ACR_NAME="${{ secrets.ACR_NAME }}"
          echo "IMAGE_REF=${ACR_NAME}.azurecr.io/${{ inputs.image_name }}:v1" >> "$GITHUB_ENV"

      # ----------------------------
      # Detect Tech Stack (Node vs Python)
      # ----------------------------
      - name: Detect Tech Stack
        id: detect_tech
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "tech=node" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ]; then
            echo "tech=python" >> "$GITHUB_OUTPUT"
          else
            echo "tech=unknown" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------
      # Node.js Pipeline (Frontend)
      # ----------------------------
      - name: Setup Node
        if: ${{ steps.detect_tech.outputs.tech == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install Node Dependencies
        if: ${{ steps.detect_tech.outputs.tech == 'node' }}
        run: npm ci

      - name: Lint Node Code
        if: ${{ steps.detect_tech.outputs.tech == 'node' }}
        run: npm run lint --if-present

      - name: Test Node Code
        if: ${{ steps.detect_tech.outputs.tech == 'node' }}
        run: npm test --if-present

      # ----------------------------
      # Python Pipeline (Backend)
      # ----------------------------
      - name: Setup Python
        if: ${{ steps.detect_tech.outputs.tech == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install Python Dependencies
        if: ${{ steps.detect_tech.outputs.tech == 'python' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Python Code (if tests folder exists)
        if: ${{ steps.detect_tech.outputs.tech == 'python' }}
        shell: bash
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest
          else
            echo "No tests directory found, skipping python tests."
          fi

      # ----------------------------
      # Optional checks (Sonar / Snyk / Slack)
      # ----------------------------
      - name: Resolve Optional Checks
        id: checks
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "run_sonar=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_sonar=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$SNYK_TOKEN" ]; then
            echo "run_snyk=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_snyk=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$WEBHOOK_URL" ]; then
            echo "run_slack=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_slack=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: ${{ steps.checks.outputs.run_sonar == 'true' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Setup Snyk CLI
        if: ${{ steps.checks.outputs.run_snyk == 'true' }}
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Scan (Node dependencies)
        if: ${{ steps.checks.outputs.run_snyk == 'true' && steps.detect_tech.outputs.tech == 'node' }}
        run: snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Scan (Python dependencies)
        if: ${{ steps.checks.outputs.run_snyk == 'true' && steps.detect_tech.outputs.tech == 'python' }}
        run: snyk test --file=requirements.txt --skip-unresolved
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ----------------------------
      # Azure Login + ACR Login
      # ----------------------------
      - name: Azure Login
        if: ${{ inputs.push_image }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: ${{ inputs.push_image }}
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      # ----------------------------
      # Build Docker image
      # ----------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "${IMAGE_REF}" \
            "${{ inputs.docker_context }}"

      # ----------------------------
      # Security scan
      # ----------------------------
      - name: Trivy Scan
        if: ${{ inputs.run_trivy }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # ----------------------------
      # Push to ACR
      # ----------------------------
      - name: Push Image to ACR
        if: ${{ inputs.push_image }}
        run: |
          docker push "${IMAGE_REF}"

      # ----------------------------
      # Slack notifications
      # ----------------------------
      - name: Slack Notify Success
        if: ${{ success() && steps.checks.outputs.run_slack == 'true' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "CI SUCCESS: ${{ github.repository }} on ${{ github.ref_name }} (${{ github.sha }}) -> ${{ env.IMAGE_REF }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Slack Notify Failure
        if: ${{ failure() && steps.checks.outputs.run_slack == 'true' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "CI FAILED: ${{ github.repository }} on ${{ github.ref_name }} (${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
